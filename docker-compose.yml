version: '3.8'

services:
  # 1. PostgreSQL Relational Database Service
  db:
    image: postgres:16-alpine
    container_name: livestock_postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_DB: ${DB_NAME:-livestock_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    networks:
      - livestock_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-livestock_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # 2. Livestock Backend & Next.js Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: livestock_app_backend
    restart: always
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      CORS_ORIGIN: "*"
      # Use the Docker Compose service name 'db' as the database host
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres123}
      DB_NAME: ${DB_NAME:-livestock_db}
      DB_SSL: "false"
      DB_POOL_MIN: 2
      DB_POOL_MAX: 20
      DB_IDLE_TIMEOUT_MS: 30000
      DB_CONN_TIMEOUT_MS: 5000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - livestock_net

networks:
  livestock_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
